name: 'my_first_project'
version: '1.0.0'

profile: 'my_first_project'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# configure all models in the example/ directory as views
models:
  my_first_project:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
      analytics:
        +schema: marts

seeds:
  my_first_project:
    ecommerce_brazillian_olist:
      +schema: raw_ecommerce
    
    personal_finance:
      +schema: raw_personal_finance

vars:
  my_first_project:
    github_pr_heavy_ratio_threshold: 1.5
    github_balanced_ratio_threshold: 3
    github_growth_event_types:
    - WatchEvent
    - ForkEvent