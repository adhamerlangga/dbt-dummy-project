version: 2

models:
  - name: fact_orders
    description: "Fact table containing order-level metrics and dimensions for analysis"
    tests:
      - unique:
          arguments:
            column_name: order_id ||'-'|| order_item_id
    columns:

      - name: order_item_id
        description: "Unique identifier for each order item."
        tests:
          - not_null

      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - not_null

      - name: customer_id
        description: "Foreign key to stg_customers. Links order to a customer."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: price
        description: "Total price of the order"
        tests:
          - not_null

      - name: freight_value
        description: "Freight cost for the order"
        tests:
          - not_null

  - name: monthly_revenue
    description: "Monthly revenue aggregated from delivered orders"
    columns:
      - name: revenue_month
        description: "First day of the month for the reporting period"
        tests:
          - unique
          - not_null

      - name: total_revenue
        description: "Sum of total item revenue for delivered orders"
        tests:
          - not_null
  
  - name: product_performance
    description: "Performance metrics for products based on delivered orders"
    columns:
      - name: product_category_name
        description: "Category of the product"
        tests:
          - unique
          - not_null
  
  - name: customer_lifetime_value
    description: "Lifetime value of each customer based on their orders"
    columns:
      - name: customer_unique_id
        description: "Unique identifier for each customer"
        tests:
          - unique
          - not_null
  
  - name: cohort_analysis
    description: "Cohort analysis of customer retention"
    columns:
      - name: cohort_month
        description: "First month of the cohort based on customer's first order"
        tests:
          - not_null
      
      - name: months_since_first_order
        description: "Number of months since the customer's first order"
        tests:
          - not_null
  
  - name: fact_monthly_spending
    description: "Fact table containing monthly spending metrics"
    tests:
      - unique:
          arguments:
            column_name: spending_month || '-' || category
    columns:
      - name: spending_month
        description: "First day of the month for the reporting period"
        tests:
          - not_null
      
      - name: category
        description: "Category of the spending"
        tests:
          - not_null

      - name: total_spending
        description: "Total spending in the month"
        tests:
          - not_null

      - name: total_transactions
        description: "Total number of transactions in the month"
        tests:
          - not_null
      
      - name: avg_transaction_amount
        description: "Average amount per transaction in the month"
        tests:
          - not_null
  
  - name: categories_spending_trend
    description: "Trends in spending by category over time"
    tests:
      - unique:
          arguments:
            column_name: spending_month || '-' || category
    columns:
      - name: spending_month
        description: "First day of the month for the reporting period"
        tests:
          - not_null
      
      - name: category
        description: "Category of the spending"
        tests:
          - not_null
      
      