name: dbt CI

on:
    push:
        branches:
        - main
    pull_request:
        branches:
        - main

jobs:
    dbt-ci:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
    
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
            
            - name: Install dbt
              run: pip install dbt-duckdb
            
            - name: Install dbt packages
              run: dbt deps
            
            - name: Create dbt profile
              run: |
                mkdir -p ~/.dbt
                cat > ~/.dbt/profiles.yml <<EOF
                my_first_project:
                  target: dev
                  outputs:
                    dev:
                      type: duckdb
                      path: dev.duckdb
                      schema: main
                      threads: 4
                EOF

            - name: Compile dbt project
              run: dbt compile
            
            - name: Build dbt project
              run: dbt build

            - name: Run dbt tests
              run: dbt test